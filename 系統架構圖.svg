<svg viewBox="0 0 940 720" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif" role="img">
  <title>譯彩紛呈：重譯文本分析系統 — 系統架構圖</title>
  <desc>五層架構：使用者、Gradio 前端、應用控制層、雙 LLM 代理與分析引擎、資料層。</desc>

  <rect width="940" height="720" rx="12" fill="#0f172a"/>

  <text x="470" y="34" text-anchor="middle" fill="#38bdf8" font-size="18" font-weight="700">譯彩紛呈：重譯文本分析系統　系統架構</text>
  <text x="470" y="54" text-anchor="middle" fill="#818cf8" font-size="11">TransPrism II ｜ Spectra Engine</text>

  <rect x="650" y="64" width="13" height="13" rx="3" fill="#0ea5e9"/>
  <text x="668" y="75" fill="#94a3b8" font-size="10.5">系統模組</text>
  <rect x="745" y="64" width="13" height="13" rx="3" fill="#7c3aed"/>
  <text x="763" y="75" fill="#94a3b8" font-size="10.5">LLM 代理</text>
  <rect x="835" y="64" width="13" height="13" rx="3" fill="#1e293b" stroke="#334155"/>
  <text x="853" y="75" fill="#94a3b8" font-size="10.5">資料</text>

  <rect x="30" y="90" width="880" height="52" rx="10" fill="#0b1220" stroke="#1e3a5f"/>
  <text x="48" y="113" fill="#64748b" font-size="10">① 使用者層</text>
  <rect x="370" y="100" width="200" height="32" rx="8" fill="#0ea5e9" opacity="0.9"/>
  <text x="470" y="121" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">使用者 · 瀏覽器 (localhost:7860)</text>

  <path d="M470 142 L470 158" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="160" width="880" height="92" rx="10" fill="#0b1220" stroke="#1e3a5f"/>
  <text x="48" y="180" fill="#64748b" font-size="10">② 前端介面層　Gradio Blocks</text>
  <g fill="#0c4a6e" stroke="#38bdf8" stroke-width="0.8">
    <rect x="52" y="190" width="160" height="48" rx="7"/>
    <rect x="228" y="190" width="160" height="48" rx="7"/>
    <rect x="404" y="190" width="160" height="48" rx="7"/>
    <rect x="580" y="190" width="150" height="48" rx="7"/>
    <rect x="746" y="190" width="144" height="48" rx="7"/>
  </g>
  <g fill="#e2e8f0" font-size="11" text-anchor="middle">
    <text x="132" y="212">對話視窗</text><text x="132" y="228" font-size="9" fill="#7dd3fc">scenario / 引導</text>
    <text x="308" y="212">輸入框 · 送出</text><text x="308" y="228" font-size="9" fill="#7dd3fc">使用者指令</text>
    <text x="484" y="212">執行視窗</text><text x="484" y="228" font-size="9" fill="#7dd3fc">即時訊息</text>
    <text x="655" y="212">執行進度</text><text x="655" y="228" font-size="9" fill="#7dd3fc">to-do 1~8</text>
    <text x="818" y="212">結果分頁</text><text x="818" y="228" font-size="9" fill="#7dd3fc">3 大分頁</text>
  </g>

  <path d="M470 252 L470 268" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="270" width="880" height="86" rx="10" fill="#0b1220" stroke="#1e3a5f"/>
  <text x="48" y="290" fill="#64748b" font-size="10">③ 應用控制層　事件處理 · 狀態機 · Session</text>
  <g font-size="9" text-anchor="middle">
    <g fill="#13233b" stroke="#38bdf8" stroke-width="0.6">
      <rect x="52" y="300" width="92" height="40" rx="6"/>
      <rect x="156" y="300" width="92" height="40" rx="6"/>
      <rect x="260" y="300" width="92" height="40" rx="6"/>
      <rect x="364" y="300" width="100" height="40" rx="6"/>
      <rect x="476" y="300" width="100" height="40" rx="6"/>
      <rect x="588" y="300" width="92" height="40" rx="6"/>
      <rect x="692" y="300" width="92" height="40" rx="6"/>
      <rect x="796" y="300" width="94" height="40" rx="6"/>
    </g>
    <g fill="#cbd5e1">
      <text x="98" y="318">情境選擇</text><text x="98" y="332" fill="#64748b" font-size="8">①</text>
      <text x="202" y="318">上傳引導</text><text x="202" y="332" fill="#64748b" font-size="8">②</text>
      <text x="306" y="318">文本上傳</text><text x="306" y="332" fill="#64748b" font-size="8">③</text>
      <text x="414" y="318">格式驗證</text><text x="414" y="332" fill="#64748b" font-size="8">④</text>
      <text x="526" y="318" fill="#fbbf24">Metadata</text><text x="526" y="332" fill="#64748b" font-size="8">說明表單</text>
      <text x="634" y="318">指標計算</text><text x="634" y="332" fill="#64748b" font-size="8">⑤</text>
      <text x="738" y="318">統計分析</text><text x="738" y="332" fill="#64748b" font-size="8">⑥</text>
      <text x="843" y="318">報告·下載</text><text x="843" y="332" fill="#64748b" font-size="8">⑦⑧</text>
    </g>
  </g>

  <path d="M300 356 L300 372" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M640 356 L640 372" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="374" width="880" height="176" rx="10" fill="#0b1220" stroke="#1e3a5f"/>
  <text x="48" y="394" fill="#64748b" font-size="10">④ 智能代理 + 分析引擎</text>

  <rect x="52" y="404" width="250" height="130" rx="9" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.1"/>
  <text x="177" y="424" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">雙 Agent（OpenRouter）</text>
  <rect x="68" y="436" width="218" height="42" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="0.6"/>
  <text x="177" y="453" text-anchor="middle" fill="#ddd6fe" font-size="10" font-weight="600">主 Agent · LLM1</text>
  <text x="177" y="468" text-anchor="middle" fill="#a78bfa" font-size="8.5">gemma-4-31b｜情境引導·報告撰寫</text>
  <rect x="68" y="484" width="218" height="42" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="0.6"/>
  <text x="177" y="501" text-anchor="middle" fill="#ddd6fe" font-size="10" font-weight="600">工作程序 Agent · LLM2</text>
  <text x="177" y="516" text-anchor="middle" fill="#a78bfa" font-size="8.5">gemma-4-26b｜上傳引導·格式驗證</text>

  <rect x="320" y="404" width="570" height="130" rx="9" fill="#0c2942" stroke="#38bdf8" stroke-width="1.1"/>
  <text x="605" y="424" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">分析引擎（Python）</text>
  <g font-size="9.5" text-anchor="middle">
    <g fill="#0c4a6e" stroke="#38bdf8" stroke-width="0.7">
      <rect x="336" y="436" width="170" height="42" rx="6"/>
      <rect x="518" y="436" width="170" height="42" rx="6"/>
      <rect x="700" y="436" width="174" height="42" rx="6"/>
      <rect x="336" y="486" width="260" height="40" rx="6"/>
      <rect x="608" y="486" width="266" height="40" rx="6"/>
    </g>
    <g fill="#e2e8f0">
      <text x="421" y="455">指標計算</text><text x="421" y="470" font-size="8" fill="#7dd3fc">75 項語言指標</text>
      <text x="603" y="455">敘述統計</text><text x="603" y="470" font-size="8" fill="#7dd3fc">平均/SD/CV</text>
      <text x="787" y="455">差異檢定</text><text x="787" y="470" font-size="8" fill="#7dd3fc">t檢定/ANOVA</text>
      <text x="466" y="505">監督式：隨機森林</text><text x="466" y="518" font-size="8" fill="#7dd3fc">準確率·特徵重要性</text>
      <text x="741" y="505">非監督：分群/PCA</text><text x="741" y="518" font-size="8" fill="#7dd3fc">HC·KMeans·2D</text>
    </g>
  </g>

  <path d="M470 550 L470 566" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="568" width="880" height="118" rx="10" fill="#0b1220" stroke="#1e3a5f"/>
  <text x="48" y="588" fill="#64748b" font-size="10">⑤ 資料層　sessions/&lt;uuid&gt;/ · resources</text>
  <g font-size="9" text-anchor="middle">
    <g fill="#1e293b" stroke="#334155" stroke-width="0.8">
      <rect x="52" y="600" width="158" height="34" rx="6"/>
      <rect x="226" y="600" width="158" height="34" rx="6"/>
      <rect x="400" y="600" width="158" height="34" rx="6"/>
      <rect x="574" y="600" width="158" height="34" rx="6"/>
      <rect x="748" y="600" width="142" height="34" rx="6"/>
      <rect x="52" y="644" width="332" height="32" rx="6"/>
      <rect x="400" y="644" width="332" height="32" rx="6"/>
      <rect x="748" y="644" width="142" height="32" rx="6"/>
    </g>
    <g fill="#cbd5e1">
      <text x="131" y="621">上傳斷詞檔</text>
      <text x="305" y="621">textIndex.csv</text>
      <text x="479" y="621">敘述/差異 csv</text>
      <text x="653" y="621">特徵/分群圖</text>
      <text x="819" y="621">cluster csv</text>
      <text x="218" y="664">研究報告 docx / txt</text>
      <text x="566" y="664">參考語料資源 (resources)</text>
      <text x="819" y="664">XLSX 匯出</text>
    </g>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
