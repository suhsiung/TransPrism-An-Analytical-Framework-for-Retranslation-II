<svg viewBox="0 0 820 980" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Arial, sans-serif">
  <title>重譯分析系統架構與使用流程</title>

  <!-- Background -->
  <rect width="820" height="980" fill="#f8f9fa" rx="0"/>

  <!-- Title -->
  <rect x="20" y="14" width="780" height="44" rx="8" fill="#1a1a2e"/>
  <text x="410" y="41" text-anchor="middle" fill="white" font-size="16" font-weight="700">重譯文本分析系統 — 架構與使用流程</text>

  <!-- ══ LAYER LABELS ══ -->
  <!-- User Layer -->
  <rect x="20" y="70" width="100" height="860" rx="6" fill="#e8f4fd" opacity="0.6"/>
  <text x="70" y="505" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="600" transform="rotate(-90,70,505)">使 用 者 介 面（Gradio）</text>

  <!-- Main Agent Layer -->
  <rect x="130" y="70" width="170" height="860" rx="6" fill="#fce4ec" opacity="0.5"/>
  <text x="215" y="505" text-anchor="middle" fill="#b71c1c" font-size="12" font-weight="600" transform="rotate(-90,215,505)">主 Agent — LLM1（gemma-4-31b）</text>

  <!-- Worker Agent Layer -->
  <rect x="310" y="70" width="170" height="860" rx="6" fill="#e8f5e9" opacity="0.5"/>
  <text x="395" y="505" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="600" transform="rotate(-90,395,505)">工作程序 Agent — LLM2（gemma-4-26b）</text>

  <!-- Processing Layer -->
  <rect x="490" y="70" width="310" height="860" rx="6" fill="#fffde7" opacity="0.5"/>
  <text x="645" y="505" text-anchor="middle" fill="#f57f17" font-size="12" font-weight="600" transform="rotate(-90,645,505)">本 地 計 算 引 擎</text>

  <!-- ══ STEP BOXES ══ -->

  <!-- STEP 1: 情境選擇 -->
  <rect x="135" y="90" width="155" height="50" rx="6" fill="#e53935"/>
  <text x="212" y="111" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 1</text>
  <text x="212" y="128" text-anchor="middle" fill="white" font-size="12">研究情境選擇</text>

  <rect x="25" y="100" width="90" height="30" rx="5" fill="#1565c0"/>
  <text x="70" y="120" text-anchor="middle" fill="white" font-size="11">使用者選擇</text>

  <line x1="115" y1="115" x2="135" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Options box -->
  <rect x="500" y="88" width="290" height="55" rx="6" fill="white" stroke="#e53935" stroke-width="1.5"/>
  <text x="645" y="106" text-anchor="middle" fill="#333" font-size="11" font-weight="600">四種情境</text>
  <text x="645" y="122" text-anchor="middle" fill="#555" font-size="10">① 人機對比  ② 全譯vs編譯</text>
  <text x="645" y="137" text-anchor="middle" fill="#555" font-size="10">③ 譯者風格  ④ 歷時重譯</text>
  <line x1="290" y1="115" x2="500" y2="115" stroke="#e53935" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="140" x2="212" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 2: 上傳引導 -->
  <rect x="135" y="165" width="155" height="50" rx="6" fill="#c62828"/>
  <text x="212" y="186" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 2</text>
  <text x="212" y="203" text-anchor="middle" fill="white" font-size="12">上傳規則引導</text>

  <line x1="290" y1="190" x2="315" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="315" y="165" width="155" height="50" rx="6" fill="#388e3c"/>
  <text x="392" y="186" text-anchor="middle" fill="white" font-size="11" font-weight="700">LLM2 生成</text>
  <text x="392" y="203" text-anchor="middle" fill="white" font-size="12">情境專屬說明</text>

  <!-- Arrow down -->
  <line x1="212" y1="215" x2="212" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 3: 文本上傳 -->
  <rect x="25" y="240" width="90" height="50" rx="5" fill="#1565c0"/>
  <text x="70" y="261" text-anchor="middle" fill="white" font-size="10" font-weight="700">上傳</text>
  <text x="70" y="277" text-anchor="middle" fill="white" font-size="10">.txt × N</text>

  <rect x="135" y="240" width="155" height="50" rx="6" fill="#ad1457"/>
  <text x="212" y="261" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 3</text>
  <text x="212" y="278" text-anchor="middle" fill="white" font-size="12">文本上傳接收</text>
  <line x1="115" y1="265" x2="135" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Detail box -->
  <rect x="500" y="238" width="290" height="55" rx="6" fill="white" stroke="#ad1457" stroke-width="1.5"/>
  <text x="645" y="258" text-anchor="middle" fill="#333" font-size="11" font-weight="600">檔案命名規則</text>
  <text x="645" y="273" text-anchor="middle" fill="#555" font-size="10">A_xx.txt / B_xx.txt … 區分組別</text>
  <text x="645" y="288" text-anchor="middle" fill="#555" font-size="10">格式：詞_詞性 ｜ _詞性 ｜ 空白行</text>
  <line x1="290" y1="265" x2="500" y2="265" stroke="#ad1457" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="290" x2="212" y2="315" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 4: 格式驗證 -->
  <rect x="135" y="315" width="155" height="50" rx="6" fill="#6a1b9a"/>
  <text x="212" y="336" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 4</text>
  <text x="212" y="353" text-anchor="middle" fill="white" font-size="12">格式驗證 / 修復</text>

  <line x1="290" y1="340" x2="315" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="315" y="315" width="155" height="50" rx="6" fill="#388e3c"/>
  <text x="392" y="336" text-anchor="middle" fill="white" font-size="11" font-weight="700">LLM2 回應</text>
  <text x="392" y="353" text-anchor="middle" fill="white" font-size="12">錯誤說明 / 重傳</text>

  <rect x="500" y="313" width="290" height="55" rx="6" fill="white" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="645" y="333" text-anchor="middle" fill="#333" font-size="11" font-weight="600">逐 token 驗證</text>
  <text x="645" y="350" text-anchor="middle" fill="#555" font-size="10">正則：^[^\s_]+_[A-Z]+ 或 ^_[A-Z]+$</text>
  <text x="645" y="365" text-anchor="middle" fill="#555" font-size="10">格式錯誤 → 提示重新上傳</text>
  <line x1="290" y1="340" x2="500" y2="340" stroke="#6a1b9a" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="365" x2="212" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 5: 指標計算 -->
  <rect x="135" y="390" width="155" height="50" rx="6" fill="#1565c0"/>
  <text x="212" y="411" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 5</text>
  <text x="212" y="428" text-anchor="middle" fill="white" font-size="12">指標計算</text>

  <rect x="500" y="388" width="290" height="90" rx="6" fill="white" stroke="#1565c0" stroke-width="1.5"/>
  <text x="645" y="408" text-anchor="middle" fill="#333" font-size="11" font-weight="600">79 個語言指標（Prog02 引擎）</text>
  <text x="645" y="425" text-anchor="middle" fill="#555" font-size="10">基礎統計 / 詞彙難易度 / 詞彙多樣性</text>
  <text x="645" y="441" text-anchor="middle" fill="#555" font-size="10">語意複雜度 / 語法複雜度 / 47 詞性標記</text>
  <text x="645" y="457" text-anchor="middle" fill="#555" font-size="10">輸出：indicators.csv（每檔一列）</text>
  <text x="645" y="472" text-anchor="middle" fill="#555" font-size="10">參照詞表：T01–T06 + strokesDictionary</text>
  <line x1="290" y1="415" x2="500" y2="415" stroke="#1565c0" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="440" x2="212" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 6: 統計分析 -->
  <rect x="135" y="470" width="155" height="50" rx="6" fill="#00695c"/>
  <text x="212" y="491" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 6</text>
  <text x="212" y="508" text-anchor="middle" fill="white" font-size="12">統計分析</text>

  <line x1="290" y1="495" x2="315" y2="495" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="315" y="470" width="155" height="50" rx="6" fill="#388e3c"/>
  <text x="392" y="491" text-anchor="middle" fill="white" font-size="11" font-weight="700">LLM2 進度</text>
  <text x="392" y="508" text-anchor="middle" fill="white" font-size="12">即時播報分析狀態</text>

  <rect x="500" y="468" width="290" height="130" rx="6" fill="white" stroke="#00695c" stroke-width="1.5"/>
  <text x="645" y="488" text-anchor="middle" fill="#333" font-size="11" font-weight="600">統計分析流程（Prog03 引擎）</text>
  <text x="645" y="505" text-anchor="middle" fill="#555" font-size="10">① 描述性統計（mean / std / min / max）</text>
  <text x="645" y="521" text-anchor="middle" fill="#555" font-size="10">② 差異檢定（t-test / ANOVA，α=0.05）</text>
  <text x="645" y="537" text-anchor="middle" fill="#555" font-size="10">③ 隨機森林（重要性排名 + 準確率）</text>
  <text x="645" y="553" text-anchor="middle" fill="#555" font-size="10">④ 層次分群（Ward法，樹狀圖）</text>
  <text x="645" y="569" text-anchor="middle" fill="#555" font-size="10">⑤ K-means 分群（PCA 2D 散點圖）</text>
  <text x="645" y="585" text-anchor="middle" fill="#555" font-size="10">輸出：統計表 / 圖表 / DOCX技術報告</text>
  <line x1="290" y1="495" x2="500" y2="495" stroke="#00695c" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="520" x2="212" y2="615" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 7: LLM 報告撰寫 -->
  <rect x="135" y="615" width="155" height="50" rx="6" fill="#e65100"/>
  <text x="212" y="636" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 7</text>
  <text x="212" y="653" text-anchor="middle" fill="white" font-size="12">LLM 研究報告</text>

  <rect x="500" y="613" width="290" height="90" rx="6" fill="white" stroke="#e65100" stroke-width="1.5"/>
  <text x="645" y="633" text-anchor="middle" fill="#333" font-size="11" font-weight="600">LLM1（主 Agent）撰寫報告</text>
  <text x="645" y="650" text-anchor="middle" fill="#555" font-size="10">依情境模組插入分析框架</text>
  <text x="645" y="666" text-anchor="middle" fill="#555" font-size="10">解讀統計結果 + 生成學術討論</text>
  <text x="645" y="682" text-anchor="middle" fill="#555" font-size="10">輸出：research_report.docx</text>
  <text x="645" y="698" text-anchor="middle" fill="#555" font-size="10">語言：繁體中文</text>
  <line x1="290" y1="640" x2="500" y2="640" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Arrow down -->
  <line x1="212" y1="665" x2="212" y2="715" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- STEP 8: ZIP 下載 -->
  <rect x="135" y="715" width="155" height="50" rx="6" fill="#37474f"/>
  <text x="212" y="736" text-anchor="middle" fill="white" font-size="11" font-weight="700">STEP 8</text>
  <text x="212" y="753" text-anchor="middle" fill="white" font-size="12">打包 ZIP 下載</text>

  <rect x="25" y="725" width="90" height="30" rx="5" fill="#1565c0"/>
  <text x="70" y="745" text-anchor="middle" fill="white" font-size="11">一鍵下載</text>
  <line x1="135" y1="740" x2="115" y2="740" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="500" y="713" width="290" height="80" rx="6" fill="white" stroke="#37474f" stroke-width="1.5"/>
  <text x="645" y="733" text-anchor="middle" fill="#333" font-size="11" font-weight="600">ZIP 內容（共 9+ 檔案）</text>
  <text x="645" y="750" text-anchor="middle" fill="#555" font-size="10">indicators.csv / descriptive_stats.csv</text>
  <text x="645" y="766" text-anchor="middle" fill="#555" font-size="10">rf_importance.csv / 分群圖 / 樹狀圖</text>
  <text x="645" y="782" text-anchor="middle" fill="#555" font-size="10">technical_report.docx / research_report.docx</text>
  <line x1="290" y1="740" x2="500" y2="740" stroke="#37474f" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- ══ STATE MACHINE ══ -->
  <rect x="25" y="820" width="775" height="130" rx="8" fill="white" stroke="#aaa" stroke-width="1.2"/>
  <text x="410" y="843" text-anchor="middle" fill="#333" font-size="12" font-weight="700">狀態機（State Machine）</text>

  <!-- States row -->
  <g font-size="9" fill="#333">
    <rect x="35" y="855" width="85" height="26" rx="4" fill="#ffcdd2"/>
    <text x="77" y="872" text-anchor="middle">SCENARIO_SELECT</text>

    <rect x="130" y="855" width="80" height="26" rx="4" fill="#f8bbd0"/>
    <text x="170" y="872" text-anchor="middle">UPLOAD_GUIDE</text>

    <rect x="220" y="855" width="70" height="26" rx="4" fill="#ce93d8"/>
    <text x="255" y="872" text-anchor="middle">UPLOAD_WAIT</text>

    <rect x="300" y="855" width="75" height="26" rx="4" fill="#b39ddb"/>
    <text x="337" y="872" text-anchor="middle">FORMAT_CHECK</text>

    <rect x="385" y="855" width="80" height="26" rx="4" fill="#90caf9"/>
    <text x="425" y="872" text-anchor="middle">FORMAT_RESOLVE</text>

    <rect x="475" y="855" width="70" height="26" rx="4" fill="#a5d6a7"/>
    <text x="510" y="872" text-anchor="middle">CALCULATING</text>

    <rect x="555" y="855" width="65" height="26" rx="4" fill="#80cbc4"/>
    <text x="587" y="872" text-anchor="middle">ANALYZING</text>

    <rect x="630" y="855" width="80" height="26" rx="4" fill="#ffcc80"/>
    <text x="670" y="872" text-anchor="middle">REPORT_WRITING</text>

    <rect x="720" y="855" width="65" height="26" rx="4" fill="#ef9a9a"/>
    <text x="752" y="872" text-anchor="middle">COMPLETE</text>
  </g>

  <!-- Arrow row -->
  <g fill="#555">
    <line x1="120" y1="868" x2="130" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="210" y1="868" x2="220" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="290" y1="868" x2="300" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="375" y1="868" x2="385" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="465" y1="868" x2="475" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="545" y1="868" x2="555" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="620" y1="868" x2="630" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
    <line x1="710" y1="868" x2="720" y2="868" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  </g>

  <!-- Notes row -->
  <text x="410" y="912" text-anchor="middle" fill="#666" font-size="10">每個 Session 擁有獨立 UUID 目錄（sessions/&lt;uuid&gt;/）｜ 資源檔啟動時一次性載入（T01–T06 詞表 + strokesDictionary.json）</text>
  <text x="410" y="930" text-anchor="middle" fill="#666" font-size="10">API：OpenRouter（urllib.request）｜ 介面：Gradio 4.x Blocks + gr.Chatbot(type="messages")</text>
  <text x="410" y="948" text-anchor="middle" fill="#666" font-size="10">格式錯誤 → FORMAT_RESOLVE → 重回 UPLOAD_WAIT（可循環修正）</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
